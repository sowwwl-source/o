openapi: 3.0.3
info:
  title: AzA API Stub
  version: 0.1.0
  description: Minimal compatibility surface for {{API_SERVICE_HOST}} while the production service is being rebuilt.
servers:
  - url: {{API_PUBLIC_BASE_URL}}
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is reachable
  /v1/status:
    get:
      summary: Runtime status
      responses:
        "200":
          description: Status payload
  /v1/user/score:
    post:
      summary: Stubbed protected endpoint
      security:
        - bearerAuth: []
      responses:
        "501":
          description: Not implemented yet
  /upload:
    post:
      summary: Stubbed upload endpoint
      security:
        - bearerAuth: []
      responses:
        "501":
          description: Not implemented yet
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
